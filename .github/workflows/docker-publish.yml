name: Docker Publish

# Собирает образы всех сервисов и web и пушит в Docker Hub.
# Требуются секреты репозитория: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
# Переменная репозитория: DOCKER_NAMESPACE (напр. ваш логин на Docker Hub).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  DOCKER_NAMESPACE: ${{ vars.DOCKER_NAMESPACE }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        service: [gateway, catalog, pricing, import, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_NAMESPACE }}/furnica-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build & push (Go services)
        if: matrix.service != 'web'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.service
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build & push (web)
        if: matrix.service == 'web'
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
