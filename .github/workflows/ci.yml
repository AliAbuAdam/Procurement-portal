name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      # Сгенерированный код (gen/) закоммичен и является входом сборки, поэтому
      # buf generate в CI не гоняем: он требует локальных плагинов protoc-gen-go*
      # (их нет в раннере) и давал бы ложные падения. Регенерация — локально
      # через `make proto`. При желании позже можно добавить отдельный drift-джоб.
      - name: Vet
        run: go vet ./services/... ./internal/...
      - name: Build
        run: go build ./services/... ./internal/... ./gen/...
      - name: Test
        run: go test ./services/... ./internal/...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
