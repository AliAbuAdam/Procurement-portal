name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Generate proto
        run: cd proto && buf generate
      - name: Vet
        run: go vet ./services/... ./internal/...
      - name: Build
        run: go build ./services/... ./internal/... ./gen/...
      - name: Test
        run: go test ./services/... ./internal/...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
